<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background -->
  <rect width="512" height="512" fill="#0e0c0a" rx="112"/>

  <!-- Warm radial glow from center -->
  <radialGradient id="centerglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c8503a" stop-opacity="0.18"/>
    <stop offset="60%" stop-color="#c8503a" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#c8503a" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#centerglow)" rx="112"/>

  <!-- Outer ring — faintest -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#c8503a" stroke-width="1.2" opacity="0.25"/>

  <!-- Middle ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#c8503a" stroke-width="1.8" opacity="0.45"/>

  <!-- Inner ring — brightest -->
  <circle cx="256" cy="256" r="128" fill="none" stroke="#c8503a" stroke-width="2.5" opacity="0.75"/>

  <!-- Center filled circle — dark with slight warmth -->
  <circle cx="256" cy="256" r="100" fill="#1a1008"/>

  <!-- Center ring border -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#c8503a" stroke-width="2" opacity="0.9"/>

  <!-- F lettermark — cream, centered -->
  <text
    x="256" y="302"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="130"
    font-weight="300"
    fill="#f0ece4"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >F</text>

</svg>
