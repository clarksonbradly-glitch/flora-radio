<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flora</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f2ec;
    --ink: #111010;
    --dust: #b0a89e;
    --accent: #c8503a;
  }

  html, body { height: 100%; background: var(--cream); color: var(--ink); font-family: 'Cormorant Garamond', Georgia, serif; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 50; opacity: 0.45;
  }

  .page {
    height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 13vh 2rem 8vh; text-align: center;
  }

  /* ── BRAND ── */
  .brand { display: flex; flex-direction: column; align-items: center; gap: 0.85rem; animation: rise 1.4s ease both; }

  .logo {
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(3rem, 10.5vw, 5.2rem);
    font-weight: 300; text-transform: uppercase; color: var(--ink); line-height: 1;
  }

  .ll { display: inline-block; margin-right: 0.38em; }
  .ll:last-child { margin-right: 0; }

  .logo-o {
    display: inline-flex; align-items: center; justify-content: center;
    width: 0.72em; height: 0.72em; margin-right: 0.38em;
    position: relative; top: 0.04em; flex-shrink: 0;
  }
  .logo-o svg { width: 100%; height: 100%; overflow: visible; }

  .s1,.s2,.s3,.s4 { fill: none; stroke: var(--accent); stroke-linecap: round; stroke-linejoin: round; }
  .s1 { stroke-width:3.5; stroke-dasharray:290; stroke-dashoffset:290; animation:draw 1s cubic-bezier(.4,0,.2,1) .4s forwards; }
  .s2 { stroke-width:1.8; stroke-dasharray:310; stroke-dashoffset:310; animation:draw 1.1s cubic-bezier(.4,0,.2,1) .55s forwards; opacity:.55; }
  .s3 { stroke-width:1.2; stroke-dasharray:270; stroke-dashoffset:270; animation:draw .9s cubic-bezier(.4,0,.2,1) .7s forwards; opacity:.35; }
  .s4 { stroke-width:.8; stroke-dasharray:180; stroke-dashoffset:180; animation:draw .75s cubic-bezier(.4,0,.2,1) .85s forwards; opacity:.2; }
  @keyframes draw { to { stroke-dashoffset:0; } }

  .subline { font-size:clamp(.46rem,1.3vw,.56rem); letter-spacing:.28em; padding-left:.28em; text-transform:uppercase; color:var(--dust); font-weight:400; }

  /* ── PLAYER ── */
  .player { display:flex; flex-direction:column; align-items:center; animation:rise 1.4s ease .2s both; }

  .eq { display:flex; align-items:flex-end; justify-content:center; gap:3px; height:22px; margin-bottom:1.4rem; opacity:0; transition:opacity .7s ease; }
  .eq.active { opacity:1; }
  .eq-bar { width:2px; background:var(--ink); border-radius:2px 2px 0 0; height:3px; transition:height .09s ease; }

  .play-btn {
    width:68px; height:68px; border-radius:50%; border:1px solid var(--ink);
    background:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    position:relative; transition:border-color .3s,transform .3s; outline:none; -webkit-tap-highlight-color:transparent;
  }
  .play-btn::before { content:''; position:absolute; width:82px; height:82px; border-radius:50%; border:1px solid rgba(17,16,16,.11); }
  .play-btn:hover { border-color:var(--accent); transform:scale(1.04); }
  .play-btn.playing { border-color:var(--accent); }
  .play-btn.playing::before { animation:breathe 2.6s ease-in-out infinite; border-color:rgba(200,80,58,.22); }
  @keyframes breathe { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.14);opacity:.2;} }

  .icon-play { width:0; height:0; border-top:9px solid transparent; border-bottom:9px solid transparent; border-left:15px solid var(--ink); margin-left:4px; }
  .icon-pause { display:none; gap:5px; align-items:center; }
  .icon-pause span { display:block; width:3px; height:14px; background:var(--accent); border-radius:1px; }
  .play-btn.playing .icon-play  { display:none; }
  .play-btn.playing .icon-pause { display:flex; }

  /* Now playing */
  .now-playing { margin-top:1.4rem; opacity:0; transform:translateY(4px); transition:opacity .5s ease .1s,transform .5s ease .1s; min-height:3rem; }
  .now-playing.visible { opacity:1; transform:translateY(0); }
  .np-label { font-size:.48rem; letter-spacing:.24em; text-transform:uppercase; color:var(--dust); margin-bottom:.28rem; }
  .np-title { font-size:clamp(.82rem,2.2vw,.96rem); font-weight:400; letter-spacing:.04em; color:var(--ink); font-style:italic; }
  .np-meta  { font-size:.46rem; letter-spacing:.18em; text-transform:uppercase; color:var(--dust); margin-top:.25rem; }

  .ident-dot {
    display:inline-block; width:5px; height:5px; border-radius:50%;
    background:var(--accent); margin-left:.5rem; vertical-align:middle;
    opacity:0; transition:opacity .3s;
  }
  .ident-dot.speaking { opacity:1; animation:blink .6s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

  /* Attribution footer */
  .attribution {
    margin-top: 1rem;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .5s ease .2s, transform .5s ease .2s;
  }
  .attribution.visible { opacity: 1; transform: translateY(0); }

  .attr-link {
    font-size: .44rem;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--dust);
    text-decoration: none;
    border-bottom: 1px solid rgba(160,154,144,.3);
    padding-bottom: 1px;
    transition: color .2s, border-color .2s;
  }
  .attr-link:hover { color: var(--accent); border-color: var(--accent); }

  .attr-divider { margin: 0 .6rem; color: var(--dust); opacity: .4; font-size: .44rem; }

  .attr-disclaimer {
    display: block;
    margin-top: .4rem;
    font-size: .38rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--dust);
    opacity: .6;
    font-style: italic;
  }

  #sc-frame { position:fixed; left:-9999px; top:-9999px; width:1px; height:1px; border:none; }

  .np-loading { font-size:.48rem; letter-spacing:.2em; text-transform:uppercase; color:var(--dust); font-style:normal; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4;} 50%{opacity:1;} }

  /* ── SCHEDULE ── */
  .schedule { display:flex; flex-direction:row; align-items:center; justify-content:center; width:100%; max-width:480px; animation:rise 1.4s ease .4s both; }
  .sched-item { display:flex; flex-direction:column; align-items:center; gap:.25rem; flex:1; cursor:pointer; padding:.5rem .4rem; transition:opacity .2s; -webkit-tap-highlight-color:transparent; }
  .sched-item:hover { opacity:.6; }
  .sched-item+.sched-item { border-left:1px solid rgba(17,16,16,.12); }
  .sched-time  { font-size:.44rem; letter-spacing:.16em; text-transform:uppercase; color:var(--dust); white-space:nowrap; }
  .sched-genre { font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink); font-weight:400; white-space:nowrap; }
  .sched-hint  { width:12px; height:1px; background:rgba(17,16,16,.2); margin-top:.2rem; transition:width .3s ease,background .3s; }
  .sched-item:hover .sched-hint { width:20px; background:var(--accent); }
  .sched-item.now-slot .sched-genre { color:var(--accent); }
  .sched-item.now-slot .sched-hint  { width:20px; background:var(--accent); }

  /* ── POPUP ── */
  .overlay { position:fixed; inset:0; z-index:200; display:flex; align-items:flex-end; justify-content:center; pointer-events:none; padding:0 1rem 2rem; }
  .overlay.open { pointer-events:all; }
  .overlay-backdrop { position:fixed; inset:0; background:rgba(245,242,236,0); transition:background .35s ease; z-index:-1; }
  .overlay.open .overlay-backdrop { background:rgba(245,242,236,.75); }
  .popup { width:100%; max-width:420px; background:var(--cream); border:1px solid rgba(17,16,16,.13); border-radius:2px; padding:2rem 2rem 1.8rem; text-align:center; transform:translateY(24px); opacity:0; transition:transform .38s cubic-bezier(.22,1,.36,1),opacity .3s ease; box-shadow:0 4px 32px rgba(17,16,16,.07); position:relative; }
  .overlay.open .popup { transform:translateY(0); opacity:1; }
  .popup-time  { font-size:.44rem; letter-spacing:.22em; text-transform:uppercase; color:var(--dust); margin-bottom:.5rem; }
  .popup-title { font-size:clamp(1.3rem,4vw,1.7rem); font-weight:300; letter-spacing:.08em; color:var(--ink); margin-bottom:.9rem; line-height:1.1; }
  .popup-rule  { width:28px; height:1px; background:var(--accent); margin:0 auto 1rem; }
  .popup-body  { font-size:clamp(.82rem,2vw,.92rem); font-weight:300; line-height:1.75; color:rgba(17,16,16,.72); font-style:italic; }
  .popup-close { position:absolute; top:1rem; right:1.2rem; background:none; border:none; cursor:pointer; font-size:.5rem; letter-spacing:.2em; text-transform:uppercase; color:var(--dust); font-family:'Cormorant Garamond',serif; transition:color .2s; outline:none; }
  .popup-close:hover { color:var(--ink); }

  @keyframes rise { from{opacity:0;transform:translateY(9px);} to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>

<div class="page">

  <div class="brand">
    <div class="logo">
      <span class="ll">F</span>
      <span class="ll">L</span>
      <span class="logo-o">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path class="s1" d="M 50,6 C 72,5 94,24 94,50 C 94,76 74,95 50,95 C 26,95 6,76 6,50 C 6,24 26,5 50,6"/>
          <path class="s2" d="M 53,5 C 76,4 97,23 96,51 C 95,78 75,97 50,96 C 24,97 3,77 4,51 C 3,24 24,4 51,5"/>
          <path class="s3" d="M 48,9 C 68,8 89,27 89,50 C 89,73 70,91 48,92 C 27,92 10,73 10,51 C 9,28 28,9 48,9"/>
          <path class="s4" d="M 44,8 C 47,6 53,6 57,8"/>
        </svg>
      </span>
      <span class="ll">R</span>
      <span class="ll">A</span>
    </div>
    <div class="subline">Continuous electronic music transmission</div>
  </div>

  <div class="player">
    <div class="eq" id="eq">
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>

    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <div class="icon-play"></div>
      <div class="icon-pause"><span></span><span></span></div>
    </button>

    <div class="now-playing" id="nowPlaying">
      <div class="np-label">
        Now playing
        <span class="ident-dot" id="identDot"></span>
      </div>
      <div class="np-title" id="npTitle">—</div>
      <div class="np-meta"  id="npMeta"></div>
    </div>

    <!-- Attribution -->
    <div class="attribution" id="attribution">
      <a class="attr-link" id="attrSoundcloud" href="#" target="_blank" rel="noopener">Streamed via SoundCloud</a>
      <span class="attr-divider">·</span>
      <a class="attr-link" id="attrArtist" href="#" target="_blank" rel="noopener">Artist Page ↗</a>
      <span class="attr-disclaimer">Flora does not host or own any audio content. All rights remain with the respective artists.</span>
    </div>
  </div>

  <div class="schedule">
    <div class="sched-item" id="slot-day" onclick="openPopup('day')">
      <div class="sched-time">9AM – 5PM</div>
      <div class="sched-genre">Soft Drift</div>
      <div class="sched-hint"></div>
    </div>
    <div class="sched-item" id="slot-evening" onclick="openPopup('evening')">
      <div class="sched-time">5PM – Midnight</div>
      <div class="sched-genre">The Ascent</div>
      <div class="sched-hint"></div>
    </div>
    <div class="sched-item" id="slot-night" onclick="openPopup('night')">
      <div class="sched-time">Midnight – 9AM</div>
      <div class="sched-genre">The Descent</div>
      <div class="sched-hint"></div>
    </div>
  </div>

</div>

<iframe id="sc-frame" allow="autoplay"></iframe>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="overlay-backdrop"></div>
  <div class="popup" id="popup">
    <button class="popup-close" onclick="closePopup()">Close</button>
    <div class="popup-time"  id="popupTime"></div>
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-rule"></div>
    <div class="popup-body"  id="popupBody"></div>
  </div>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// ─────────────────────────────────────────────
// FLORA RADIO — Mix Library
// ─────────────────────────────────────────────
const LIBRARY = [
  // DAY — Soft Drift (9AM–5PM)
  { url:'https://soundcloud.com/ibizaglobalradio/ozalid-tech-tunes-radio-ibiza', title:'Tech Tunes Radio #022',         artist:'Ozalid',          year:'2026', event:'Ibiza Global Radio',  artistSC:'https://soundcloud.com/ibizaglobalradio', genre:'day' },
  { url:'https://soundcloud.com/floatingpoints/floating-points-fact-mix-75',    title:'FACT Mix 75',                   artist:'Floating Points', year:'2017', event:'FACT Magazine',       artistSC:'https://soundcloud.com/floatingpoints',   genre:'day' },
  { url:'https://soundcloud.com/peggy-gou/peggy-gou-dj-kicks',                 title:'DJ Kicks',                      artist:'Peggy Gou',       year:'2019', event:'DJ Kicks',            artistSC:'https://soundcloud.com/peggy-gou',        genre:'day' },

  // EVENING — The Ascent (5PM–Midnight)
  { url:'https://soundcloud.com/sven-vath/sven-vath-in-the-mix-the-sound',     title:'Sound of the 13th Season',      artist:'Sven Väth',       year:'2013', event:'Cocoon Ibiza',        artistSC:'https://soundcloud.com/sven-vath',        genre:'evening' },
  { url:'https://soundcloud.com/carl-cox-official/carl-cox-live-at-time-warp-2017', title:'Live at Time Warp',        artist:'Carl Cox',        year:'2017', event:'Time Warp',           artistSC:'https://soundcloud.com/carl-cox-official',genre:'evening' },
  { url:'https://soundcloud.com/igor-marijuan/igor-marijuan-ibiza-global-radio',title:'Ibiza Global Radio Session',    artist:'Igor Marijuan',   year:'2018', event:'Ibiza Global Radio',  artistSC:'https://soundcloud.com/igor-marijuan',    genre:'evening' },

  // NIGHT — The Descent (Midnight–9AM)
  { url:'https://soundcloud.com/richie-hawtin/richie-hawtin-close-combined',   title:'CLOSE Combined',                artist:'Richie Hawtin',   year:'2018', event:'Studio',              artistSC:'https://soundcloud.com/richie-hawtin',    genre:'night' },
  { url:'https://soundcloud.com/sven-vath/sven-vath-cocoon-amnesia-ibiza',     title:'Cocoon Ibiza Closing',          artist:'Sven Väth',       year:'2010', event:'Amnesia Ibiza',       artistSC:'https://soundcloud.com/sven-vath',        genre:'night' },
  { url:'https://soundcloud.com/objekt/objekt-boiler-room-berlin',             title:'Boiler Room Berlin',            artist:'Objekt',          year:'2016', event:'Boiler Room',         artistSC:'https://soundcloud.com/objekt',           genre:'night' },
];

// ─────────────────────────────────────────────
// DAILY SEED SHUFFLE
// ─────────────────────────────────────────────
function seededRandom(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}
function getDailySeed() { const d = new Date(); return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate(); }
function shuffleWithSeed(arr, seed) {
  const rng = seededRandom(seed), a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ─────────────────────────────────────────────
// TIME SLOT
// ─────────────────────────────────────────────
function getCurrentGenre() { const h = new Date().getHours(); return h>=9&&h<17?'day':h>=17&&h<24?'evening':'night'; }
function highlightSlot() {
  const g = getCurrentGenre();
  document.querySelectorAll('.sched-item').forEach(el => el.classList.remove('now-slot'));
  document.getElementById({day:'slot-day',evening:'slot-evening',night:'slot-night'}[g])?.classList.add('now-slot');
}

const genre      = getCurrentGenre();
const pool       = LIBRARY.filter(t => t.genre === genre);
const queue      = shuffleWithSeed(pool, getDailySeed());
let   queueIndex = 0;

// ─────────────────────────────────────────────
// VOICE IDENT
// ─────────────────────────────────────────────
const IDENT_INTERVAL_MS = 20 * 60 * 1000;
let   identTimer = null;
let   isSpeaking = false;
const dot = document.getElementById('identDot');

function applyVoiceStyle(u) {
  u.rate = 0.78; u.pitch = 0.6; u.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.name.toLowerCase().includes('google uk english male') ||
    v.name.toLowerCase().includes('daniel') ||
    v.name.toLowerCase().includes('alex') ||
    v.name.toLowerCase().includes('english')
  );
  if (preferred) u.voice = preferred;
}

function setWidgetVolume(vol) { if (widget) widget.setVolume(vol); }

function rampVolume(from, to, ms, done) {
  const steps = 20, stepTime = ms/steps, stepSize = (to-from)/steps;
  let current = from, count = 0;
  const iv = setInterval(() => {
    current += stepSize; count++;
    setWidgetVolume(Math.round(Math.max(0, Math.min(100, current))));
    if (count >= steps) { clearInterval(iv); if (done) done(); }
  }, stepTime);
}

function speak(text, onDone) {
  if (!window.speechSynthesis || isSpeaking) { if (onDone) onDone(); return; }
  isSpeaking = true;
  dot.classList.add('speaking');
  rampVolume(100, 18, 700, () => {
    const u = new SpeechSynthesisUtterance(text);
    applyVoiceStyle(u);
    u.onend = () => { rampVolume(18, 100, 900, () => { isSpeaking = false; dot.classList.remove('speaking'); if (onDone) onDone(); }); };
    u.onerror = () => { setWidgetVolume(100); isSpeaking = false; dot.classList.remove('speaking'); if (onDone) onDone(); };
    window.speechSynthesis.speak(u);
  });
}

function artistCallout() { if (!playing) return; const t = queue[queueIndex]; speak(`${t.artist}. ${t.event}. ${t.year}.`); }
function stationIdent(onDone) { speak('You are listening to Flora.', onDone); }
function scheduleCallouts() { clearInterval(identTimer); identTimer = setInterval(() => { if (playing) artistCallout(); }, IDENT_INTERVAL_MS); }

// ─────────────────────────────────────────────
// SOUNDCLOUD WIDGET
// ─────────────────────────────────────────────
let widget  = null;
let playing = false;
let eqTimer = null;
const btn   = document.getElementById('playBtn');
const eq    = document.getElementById('eq');
const np    = document.getElementById('nowPlaying');
const bars  = document.querySelectorAll('.eq-bar');
const attrEl = document.getElementById('attribution');

function initWidget(trackUrl, autoplay) {
  const frame = document.getElementById('sc-frame');
  frame.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(trackUrl)}&auto_play=false&buying=false&liking=false&download=false&sharing=false&show_artwork=false&show_comments=false&show_playcount=false&show_user=false&hide_related=true&visual=false&color=%23c8503a`;
  widget = SC.Widget(frame);
  widget.bind(SC.Widget.Events.READY, () => { updateNowPlaying(); if (autoplay) widget.play(); });
  widget.bind(SC.Widget.Events.FINISH, () => { queueIndex = (queueIndex+1) % queue.length; stationIdent(() => initWidget(queue[queueIndex].url, true)); });
  widget.bind(SC.Widget.Events.ERROR,  () => { queueIndex = (queueIndex+1) % queue.length; initWidget(queue[queueIndex].url, true); });
}

function updateNowPlaying() {
  const t = queue[queueIndex];
  document.getElementById('npTitle').textContent = `${t.artist} — ${t.title}`;
  document.getElementById('npMeta').textContent  = `${t.event}  ·  ${t.year}`;
  // Update attribution links
  document.getElementById('attrSoundcloud').href = t.url;
  document.getElementById('attrArtist').href     = t.artistSC;
  document.getElementById('attrArtist').textContent = `${t.artist} on SoundCloud ↗`;
  attrEl.classList.add('visible');
}

function togglePlay() {
  if (!widget) {
    playing = true;
    btn.classList.add('playing');
    eq.classList.add('active');
    np.classList.add('visible');
    document.getElementById('npTitle').innerHTML = '<span class="np-loading">Loading</span>';
    window.speechSynthesis.getVoices();
    initWidget(queue[queueIndex].url, true);
    runEQ();
    scheduleCallouts();
    return;
  }
  playing = !playing;
  if (playing) {
    widget.play(); btn.classList.add('playing'); eq.classList.add('active'); runEQ(); scheduleCallouts();
  } else {
    widget.pause(); btn.classList.remove('playing'); eq.classList.remove('active');
    clearTimeout(eqTimer); clearInterval(identTimer);
    bars.forEach(b => b.style.height = '3px');
    window.speechSynthesis.cancel(); isSpeaking = false; dot.classList.remove('speaking'); setWidgetVolume(100);
  }
}

function runEQ() {
  if (!playing) return;
  bars.forEach(bar => { bar.style.height = (Math.random()<.12 ? 2+Math.random()*3 : 4+Math.random()*18)+'px'; });
  eqTimer = setTimeout(runEQ, 100+Math.random()*90);
}

// ─────────────────────────────────────────────
// SCHEDULE POPUPS
// ─────────────────────────────────────────────
const slots = {
  day:     { time:'9AM – 5PM',      title:'Soft Drift',  body:'The long, unhurried hours. Deep house at café tempo — warm chords, distant Rhodes, the kind of music that belongs beside an open window. Ibiza-style chill-out woven with organic textures, afro house grooves, and the occasional slow-burning balearic edit. For drifting, not arriving.' },
  evening: { time:'5PM – Midnight', title:'The Ascent',  body:'The energy builds. Peak-time house and driving techno for the transition from daylight to dark — Ibiza prime time, terrace anthems, Chicago-rooted rhythm with a Berlin edge. Expect names both legendary and rising: the floor starts filling and the tempo climbs with it.' },
  night:   { time:'Midnight – 9AM', title:'The Descent', body:'After the peak, the interior. Minimal techno, dark ambient, and stripped-back house for the deep hours — instrumental, hypnotic, unresolved. This is music that moves without destination. No vocals, no rush. Only the low end and the space between.' }
};
const overlay = document.getElementById('overlay');

function openPopup(slot) {
  const s = slots[slot];
  document.getElementById('popupTime').textContent  = s.time;
  document.getElementById('popupTitle').textContent = s.title;
  document.getElementById('popupBody').textContent  = s.body;
  overlay.classList.add('open'); document.body.style.overflow = 'hidden';
}
function closePopup() { overlay.classList.remove('open'); document.body.style.overflow=''; }
function handleOverlayClick(e) { if (e.target===overlay||e.target.classList.contains('overlay-backdrop')) closePopup(); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closePopup(); });

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
highlightSlot();
</script>
